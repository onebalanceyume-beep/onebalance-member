<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="マイページ">
<meta name="application-name" content="マイページ">
<link rel="apple-touch-icon" href="icons/icon-192x192.png">
<link rel="manifest" href="manifest.json">
<title>one-BALANCE マイページ</title>
<style>
:root{
  --red:#DB444C;--red-dark:#C0392B;--red-light:#fff0f0;
  --blue:#5BB9CD;--blue-dark:#4aa8bb;--blue-light:#e8f7fa;
  --green:#27ae60;--orange:#E8621A;--gold:#F39C12;
  --bg:#f5f5f7;--white:#ffffff;--text:#1c1c1e;--text2:#888;--text3:#bbb;
  --radius:10px;--radius-lg:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;position:relative;overflow-x:hidden;}
body.no-scroll{overflow:hidden;}

/* ステータスバー */
.status-bar{background:var(--red-dark);height:44px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 16px 6px;}
.status-bar span{color:rgba(255,255,255,0.9);font-size:11px;font-weight:600;}

/* ヘッダー */
.header{background:var(--red);padding:10px 14px 12px;}
.header-top{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.logo-wrap{width:38px;height:38px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
.header-title{font-size:16px;font-weight:800;color:white;letter-spacing:0.3px;}
.header-gym{font-size:8px;color:rgba(255,255,255,0.7);letter-spacing:1.2px;}
.profile-bar{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.28);border-radius:10px;padding:8px 11px;display:flex;align-items:center;justify-content:space-between;}
.profile-left .p-name{font-size:13px;font-weight:700;color:white;}
.profile-left .p-sub{display:flex;align-items:center;gap:5px;margin-top:3px;}
.p-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);}
.p-grade-txt{font-size:8.5px;color:rgba(255,255,255,0.85);}
.p-stars{font-size:11px;color:#f39c12;letter-spacing:1px;}
.profile-right{text-align:center;}
.star-count{font-size:16px;color:#f39c12;line-height:1;}
.star-max{font-size:7px;color:rgba(255,255,255,0.5);}

/* タブ */
.nav-wrap{background:var(--red);padding:5px 8px 6px;}
.nav-divider{height:1px;background:rgba(255,255,255,0.18);margin:3px 0;}
.nav-row{display:flex;gap:3px;}
.tab-btn{flex:1;background:transparent;border-radius:20px;padding:6px 2px;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:background .15s;}
.tab-btn.active{background:rgba(255,255,255,0.22);border:1px solid rgba(255,255,255,0.4);}
.tab-icon{width:18px;height:18px;opacity:0.65;flex-shrink:0;}
.tab-btn.active .tab-icon{opacity:1;}
.tab-txt{font-size:10px;font-weight:700;color:rgba(255,255,255,0.65);white-space:nowrap;letter-spacing:0.2px;}
.tab-btn.active .tab-txt{color:white;}

/* コンテンツ */
.content{display:none;padding:10px;}
.content.active{display:block;}

/* セクションラベル */
.sec-label{font-size:8px;font-weight:700;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;margin:0 0 7px;}

/* カード共通 */
.card{background:var(--white);border-radius:var(--radius-lg);padding:12px 13px;margin-bottom:10px;}

/* カリキュラム進捗バー */
.progress-card{text-align:center;padding:12px 14px;}
.prog-label{font-size:9px;font-weight:700;color:var(--text2);letter-spacing:0.5px;margin-bottom:6px;}
.prog-num{font-size:26px;font-weight:900;color:var(--red);line-height:1;}
.prog-num span{font-size:12px;color:var(--text3);font-weight:400;}
.prog-sub{font-size:8.5px;color:var(--blue);font-weight:700;margin:3px 0 8px;}
.prog-bar-wrap{background:#f0f0f0;border-radius:20px;height:7px;overflow:hidden;position:relative;}
.prog-bar-fill{background:var(--green);height:100%;border-radius:20px;transition:width .6s ease;}
.prog-bar-target{position:absolute;right:25%;top:0;height:100%;width:2px;background:var(--red);}
.prog-bar-labels{display:flex;justify-content:space-between;margin-top:3px;}
.prog-bar-labels span{font-size:7.5px;color:var(--text3);}
.prog-bar-labels .cur{color:var(--red);font-weight:700;}
.prog-bar-labels .goal{color:var(--green);font-weight:700;}

/* カリキュラムリスト */
.ci-list{display:flex;flex-direction:column;gap:5px;}
.ci{background:var(--white);border-radius:var(--radius-lg);padding:10px 12px;display:flex;align-items:flex-start;gap:10px;margin-bottom:1px;}
.ci.done{border-left:4px solid var(--green);}
.ci.trying{border-left:4px solid var(--blue);}
.ci.none{border-left:4px solid #eee;}
.ci-thumb{width:120px;height:90px;border-radius:8px;flex-shrink:0;overflow:hidden;background:#f0eded;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.ci-thumb img{width:100%;height:100%;object-fit:cover;}
.ci-play{width:16px;height:16px;}
.ci-info{flex:1;min-width:0;}
.ci-num{font-size:9px;color:var(--text3);margin-bottom:2px;}
.ci-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:6px;}
.ci-status{font-size:8px;margin-top:1px;}
.ci-status.done{color:var(--green);}
.ci-status.trying{color:var(--blue);}
.ci-btn{font-size:9px;padding:4px 10px;border-radius:6px;border:none;cursor:pointer;font-weight:700;flex-shrink:0;font-family:inherit;}
.ci-btn.done{background:#e8f8f0;color:var(--green);}
.ci-btn.trying{background:var(--blue-light);color:var(--blue-dark);}
.ci-btn.locked{background:#f0f0f0;color:var(--text3);}

/* グレード */
.grade-list{display:flex;flex-direction:column;gap:4px;}
.grade-item{background:var(--white);border-radius:var(--radius);padding:8px 10px;display:flex;align-items:center;gap:8px;}
.grade-item.current{background:#EBF8FF;border:1.5px solid var(--blue);}
.grade-item.locked{opacity:0.28;}
.grade-item.passed{opacity:0.55;}
.grade-medal{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.grade-info{flex:1;}
.grade-name{font-size:14px;font-weight:700;}
.grade-desc{font-size:11px;color:var(--text2);margin-top:2px;}
.grade-badge{font-size:11px;font-weight:700;flex-shrink:0;}

/* 体重 */
.weight-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.weight-card{background:var(--white);border-radius:var(--radius-lg);padding:12px;text-align:center;}
.weight-label{font-size:8px;color:var(--text2);margin-bottom:3px;}
.weight-num{font-size:28px;font-weight:900;line-height:1;}
.weight-num span{font-size:11px;font-weight:400;color:var(--text2);}
.weight-sub{font-size:8px;margin-top:3px;font-weight:700;}
.weight-chart-card{background:var(--white);border-radius:var(--radius-lg);padding:12px;margin-bottom:10px;}
.weight-chart-label{font-size:8px;font-weight:700;color:var(--text2);margin-bottom:8px;}
.weight-btn{width:100%;background:var(--red);color:white;border:none;border-radius:var(--radius);padding:13px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px;}
.weight-history{background:var(--white);border-radius:var(--radius-lg);overflow:hidden;}
.history-row{display:flex;justify-content:space-between;align-items:center;padding:9px 13px;border-bottom:1px solid #f5f5f5;}
.history-row:last-child{border-bottom:none;}
.history-date{font-size:10px;color:var(--text2);}
.history-w{font-size:13px;font-weight:700;color:var(--text);}
.history-diff{font-size:9px;font-weight:700;}

/* 技術ノート */
.badge-section{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.badge-card{background:var(--white);border-radius:var(--radius-lg);padding:12px 14px;display:flex;align-items:center;gap:12px;border:1.5px solid #f0f0f0;}
.badge-card.earned{border-color:var(--red);background:#fff8f8;}
.badge-card.locked-badge{opacity:0.55;background:#fafafa;}
.badge-icon{width:36px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.badge-name{font-size:13px;font-weight:700;color:var(--text);}
.badge-desc{font-size:11px;color:var(--text2);margin-top:3px;}
.badge-chevron{flex-shrink:0;opacity:0.3;}
.tech-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.tech-item{background:var(--white);border-radius:8px;padding:8px 9px;display:flex;align-items:center;gap:5px;cursor:pointer;}
.tech-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.tech-name{font-size:12px;font-weight:700;}

/* モーダル（体重入力） */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:white;border-radius:20px 20px 0 0;width:100%;max-width:430px;padding:20px;animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:16px;text-align:center;}
.weight-input-wrap{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:20px;}
.weight-input{font-size:40px;font-weight:900;color:var(--red);width:120px;border:none;border-bottom:3px solid var(--red);text-align:center;outline:none;background:transparent;font-family:inherit;}
.weight-unit{font-size:20px;color:var(--text2);}
.modal-btn{width:100%;background:var(--red);color:white;border:none;border-radius:var(--radius);padding:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:8px;}
.modal-cancel{width:100%;background:#f0f0f0;color:var(--text2);border:none;border-radius:var(--radius);padding:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}

/* ローディング */
.loading{text-align:center;padding:40px 20px;color:var(--text2);}
.spin{width:28px;height:28px;border:3px solid #f0f0f0;border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* トースト */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1c1c1e;color:white;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;transition:transform .25s ease;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* コミュニティ */
.comm-card{background:var(--white);border-radius:var(--radius-lg);padding:20px;text-align:center;margin-bottom:10px;}
.comm-icon{width:56px;height:56px;border-radius:50%;background:#1877F2;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;}
.comm-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px;}
.comm-desc{font-size:11px;color:var(--text2);line-height:1.6;margin-bottom:16px;}
.comm-btn{display:block;width:100%;background:#1877F2;color:white;border:none;border-radius:var(--radius);padding:13px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;}
</style>
</head>

<div class="header">

// タブ切替
function sw(tab, btn, title){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('page-title').textContent = title;
}

// GAS API呼び出し
async function api(params){
  const url = new URL(GAS_URL);
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  return new Promise((resolve)=>{
    const cb = 'cb_' + Math.random().toString(36).slice(2);
    window[cb] = (data)=>{
      delete window[cb];
      document.getElementById('_jsonp_script')?.remove();
      resolve(data);
    };
    url.searchParams.set('callback', cb);
    const s = document.createElement('script');
    s.id = '_jsonp_script';
    s.src = url.toString();
    s.onerror = ()=>{ delete window[cb]; resolve({status:'error'}); };
    document.head.appendChild(s);
    setTimeout(()=>{ if(window[cb]){ delete window[cb]; resolve({status:'error'}); } }, 10000);
  });
}

  renderGrades();
  renderBadges();
  renderTech();
  renderWeightPage();
  if(MEMBER_ID){
    await loadMember();
  } else {
    document.getElementById('member-name').textContent = 'ゲスト';
    document.getElementById('member-grade').textContent = 'URLを確認してください';
  }
};

async function loadMember(){
  try{
    const d = await api({action:'getMember', id:MEMBER_ID});
    if(d && d.status==='ok' && d.data){
      MEMBER = d.data;
      PROGRESS = d.data.progress || {};
      updateHeader();
      updateProgress();
    } else {
      document.getElementById('member-name').textContent = 'データなし';
      document.getElementById('member-grade').textContent = '会員情報が見つかりません';
      document.getElementById('star-count').textContent = '---';
      renderCurriculumItems();
    }
  }catch(e){
    document.getElementById('member-name').textContent = 'エラー';
    document.getElementById('member-grade').textContent = '接続に失敗しました';
    document.getElementById('star-count').textContent = '---';
    renderCurriculumItems();
  }
}

function updateHeader(){
  if(!MEMBER) return;
  document.getElementById('member-name').textContent = (MEMBER.name||'') + ' さん';
  document.getElementById('member-grade').textContent = MEMBER.grade || 'ホワイト前';
  const badges = MEMBER.badges || {};
  let stars = '';
  let count = 0;
  if(badges.defense){stars+='⭐';count++;}
  if(badges.step){stars+='⭐';count++;}
  if(badges.counter){stars+='⭐';count++;}
  if(badges.basic){stars+='🌟🌟';count+=2;}
  document.getElementById('member-stars').textContent = stars;
  document.getElementById('star-count').textContent = count > 0 ? stars : '―';
  // バッジアイコンを表示
  const badgeIcons = [];
  if(badges.defense) badgeIcons.push('<span title="ディフェンスマイスター" style="font-size:14px;">🛡️</span>');
  if(badges.step)    badgeIcons.push('<span title="ステップマイスター" style="font-size:14px;">👟</span>');
  if(badges.counter) badgeIcons.push('<span title="カウンターマイスター" style="font-size:14px;">⚡</span>');
  if(badges.basic)   badgeIcons.push('<span title="ベーシックマイスター" style="font-size:14px;">👑</span>');
  const badgeEl = document.getElementById('badge-icons');
  if(badgeEl) badgeEl.innerHTML = badgeIcons.join('');
}

function updateProgress(){
  const done = CURRICULUM.filter(c=>PROGRESS[c.id]==='合格').length;
  const total = CURRICULUM.length;
  const pct = Math.round((done/total)*100);
  document.getElementById('prog-count').innerHTML = `${done}<span> / ${total}</span>`;
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('prog-fill').style.width = pct+'%';
  const left = 12 - done;
  document.getElementById('prog-sub').textContent = left > 0
    ? `あと${left}項目で合格！（75%以上）`
    : '🎉 合格ライン達成！';
  renderCurriculumItems();
}

function getStatus(id){return PROGRESS[id] || '未着手';}

function ciHtml(item, isNum=false){
  const st = getStatus(item.id);
  const cls = st==='合格'?'done':st==='挑戦中'?'trying':'none';
  const playColor = st==='合格'?'#27ae60':st==='挑戦中'?'#5BB9CD':'#DB444C';
  return `<div class="ci ${cls}" id="ci-${item.id}">
    <div class="ci-thumb" onclick="openVideo('${item.url}')" style="cursor:pointer;">
      <img src="https://img.youtube.com/vi/${item.vid}/default.jpg" 
           onerror="this.style.display='none';this.nextSibling.style.display='flex'"
           alt="${item.name}">
      <div style="display:none;align-items:center;justify-content:center;width:100%;height:100%;">
        <svg class="ci-play" viewBox="0 0 10 10" fill="${playColor}"><polygon points="2,1 9,5 2,9"/></svg>
      </div>
    </div>
    <div class="ci-info">
      ${isNum ? `<div class="ci-num">${item.num}</div>` : ''}
      <div class="ci-name">${item.name}</div>
      <div style="display:flex;gap:4px;margin-top:4px;flex-wrap:nowrap;">
        <button onclick="setStatus('${item.id}','未着手')" style="font-size:9px;padding:3px 7px;border-radius:6px;border:1.5px solid ${st==='未着手'?'#DB444C':'#ddd'};background:${st==='未着手'?'#DB444C':'white'};color:${st==='未着手'?'white':'#aaa'};cursor:pointer;font-family:inherit;font-weight:700;white-space:nowrap;">未着手</button>
        <button onclick="setStatus('${item.id}','挑戦中')" style="font-size:9px;padding:3px 7px;border-radius:6px;border:1.5px solid ${st==='挑戦中'?'#5BB9CD':'#ddd'};background:${st==='挑戦中'?'#5BB9CD':'white'};color:${st==='挑戦中'?'white':'#aaa'};cursor:pointer;font-family:inherit;font-weight:700;white-space:nowrap;">挑戦中</button>
        <button onclick="setStatus('${item.id}','合格')" style="font-size:9px;padding:3px 7px;border-radius:6px;border:1.5px solid ${st==='合格'?'#27ae60':'#ddd'};background:${st==='合格'?'#27ae60':'white'};color:${st==='合格'?'white':'#aaa'};cursor:pointer;font-family:inherit;font-weight:700;white-space:nowrap;">合格</button>
      </div>
    </div>
  </div>`;
}

function openVideo(url){window.open(url,'_blank');}

async function changeStatus(id, name){
  if(!MEMBER_ID){ toast('URLを確認してください'); return; }
  const cur = getStatus(id);
  const next = cur==='未着手'?'挑戦中':cur==='挑戦中'?'合格':'未着手';
  await setStatus(id, next);
}

async function setStatus(id, status){
  if(!MEMBER_ID){ toast('URLを確認してください'); return; }
  PROGRESS[id] = status;
  updateProgress();
  toast(status + 'に変更しました');
  try{
    await api({action:'updateCurriculum', id:MEMBER_ID, item:id, status:status});
  }catch(e){ toast('保存に失敗しました'); }
}

function renderGrades(){
  const currentGrade = MEMBER?.grade || 'ホワイト前';
  document.getElementById('grade-list').innerHTML = GRADES.map(g=>{
    const isCur = g.name === currentGrade;
    const curIdx = GRADES.findIndex(x=>x.name===currentGrade);
    const myIdx = GRADES.findIndex(x=>x.name===g.name);
    const isPassed = curIdx > myIdx;
    const isLocked = myIdx > curIdx;
    const cls = isCur?'current':isLocked?'locked':isPassed?'passed':'passed';
    return `<div class="grade-item ${cls}">
      <div class="grade-medal" style="background:${g.bg};border:2px solid ${g.color};">
        ${g.locked
          ? `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="2" y="5.5" width="8" height="5.5" rx="1.2" stroke="${g.color}" stroke-width="1"/><path d="M3.5 5.5 V3.5 a2.5 2.5 0 0 1 5 0 v2" stroke="${g.color}" stroke-width="1" fill="none"/></svg>`
          : `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="8.5" r="4" fill="${g.bg}" stroke="${g.color}" stroke-width="1.2"/><path d="M4 5 L6.5 3 L9 5" stroke="${g.color}" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/><path d="M4.5 5 L4.2 5 L4.2 8" stroke="${g.color}" stroke-width="0.9" stroke-linecap="round" opacity="0.6"/><path d="M8.5 5 L8.8 5 L8.8 8" stroke="${g.color}" stroke-width="0.9" stroke-linecap="round" opacity="0.6"/></svg>`
        }
      </div>
      <div class="grade-info">
        <div class="grade-name" style="color:${g.locked?'#ccc':g.color}">${g.name}</div>
        <div class="grade-desc">${g.desc}</div>
      </div>
      <div class="grade-badge" style="color:${isCur?g.color:'#ccc'}">
        ${isCur?'← 現在':isPassed?'✓ 習得':isLocked?'🔒':''}
      </div>
    </div>`;
  }).join('');

  document.getElementById('badge-list-grade').innerHTML = badgeHtml();
}

    const earned = memberBadges[badgeKeys[i]];
    return `<div class="badge-card ${earned?'earned':'locked-badge'}" onclick="window.open('${b.url}','_blank')" style="cursor:pointer;">
      <div class="badge-icon" style="background:${b.bg};width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        ${badgeSvg(i, b.color)}
      </div>
      <div style="flex:1;">
        <div class="badge-name" style="color:${earned?b.color:'#aaa'};">${b.name} ${b.stars}</div>
        <div class="badge-desc">${b.desc}</div>
        <div style="font-size:10px;color:${earned?'#27ae60':'#bbb'};margin-top:4px;font-weight:700;">
          ${earned?'✓ 取得済み':'🔒 トレーナーから付与されます'}

      </div>
      <svg class="badge-chevron" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3 2 L7 5 L3 8" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>`;
  }).join('');
}

    <div class="tech-item" onclick="window.open('${t.url}','_blank')">
      <div class="tech-dot" style="background:${t.color};"></div>
      <span class="tech-name" style="color:${t.color};">${t.name}</span>
    </div>
  `).join('');
}

// 体重管理
const WEIGHT_KEY = 'weight_log';
function getWeightLog(){try{return JSON.parse(localStorage.getItem(WEIGHT_KEY)||'[]');}catch{return[];}}
function saveWeightLog(log){localStorage.setItem(WEIGHT_KEY,JSON.stringify(log));}

function renderWeightPage(){
  const log = getWeightLog();
  const goalWeight = parseFloat(localStorage.getItem('goalWeight')||'0');
  const cur = log.length > 0 ? log[log.length-1] : null;

  document.getElementById('cur-weight').innerHTML = cur ? `${cur.w}<span>kg</span>` : `―<span>kg</span>`;
  document.getElementById('cur-weight-date').textContent = cur ? cur.date + ' 更新' : '未記録';
  document.getElementById('goal-weight').innerHTML = goalWeight > 0 ? `${goalWeight}<span>kg</span>` : `未設定<span></span>`;

  if(cur && goalWeight > 0){
    const diff = (cur.w - goalWeight).toFixed(1);
    document.getElementById('weight-diff').textContent = diff > 0 ? `あと -${diff}kg` : '目標達成！🎉';
    document.getElementById('weight-diff').style.color = diff > 0 ? 'var(--red)' : 'var(--green)';
  } else {
    document.getElementById('weight-diff').textContent = '';
  }

  renderWeightChart(log, goalWeight);
  renderWeightHistory(log);
}

function renderWeightChart(log, goal){
  const svg = document.getElementById('weight-chart');
  if(log.length < 2){svg.innerHTML='<text x="50%" y="50%" text-anchor="middle" font-size="9" fill="#bbb" font-family="sans-serif">データが2件以上になるとグラフが表示されます</text>';return;}
  const W=300, H=80, pad={t:8,b:20,l:28,r:8};
  const ws = log.map(l=>l.w);
  let mn=Math.min(...ws, goal||Infinity), mx=Math.max(...ws, goal||0);
  const range = mx-mn || 1;
  mn -= range*0.1; mx += range*0.1;
  const gw=W-pad.l-pad.r, gh=H-pad.t-pad.b;
  const px=(i)=>pad.l+i*(gw/(log.length-1));
  const py=(v)=>pad.t+gh-(((v-mn)/(mx-mn))*gh);
  let html='';
  // グリッド
  for(let i=0;i<3;i++){const y=pad.t+i*(gh/2);html+=`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="#f0f0f0" stroke-width="0.8"/>`;}
  // 目標ライン
  if(goal>0){const gy=py(goal);html+=`<line x1="${pad.l}" y1="${gy}" x2="${W-pad.r}" y2="${gy}" stroke="#5BB9CD" stroke-width="1" stroke-dasharray="3,2"/><text x="${W-pad.r-2}" y="${gy-2}" font-size="6" fill="#5BB9CD" font-family="sans-serif" text-anchor="end">目標</text>`;}
  // 折れ線
  const pts=log.map((l,i)=>`${px(i)},${py(l.w)}`).join(' ');
  html+=`<polyline points="${pts}" fill="none" stroke="#DB444C" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>`;
  // 点
  log.forEach((l,i)=>{html+=`<circle cx="${px(i)}" cy="${py(l.w)}" r="2.5" fill="#DB444C"/>`;});
  // ラベル
  [mn+(mx-mn)*0.8, mn+(mx-mn)*0.4, mn].forEach((v,i)=>{
    html+=`<text x="${pad.l-2}" y="${pad.t+i*(gh/2)+4}" font-size="6" fill="#bbb" font-family="sans-serif" text-anchor="end">${v.toFixed(0)}</text>`;
  });
  // 日付
  const step = Math.max(1,Math.floor(log.length/5));
  log.forEach((l,i)=>{if(i%step===0||i===log.length-1){html+=`<text x="${px(i)}" y="${H-4}" font-size="5.5" fill="#bbb" font-family="sans-serif" text-anchor="middle">${l.date.slice(5)}</text>`;}});
  svg.innerHTML=html;
}

function renderWeightHistory(log){
  if(log.length===0){document.getElementById('weight-history').innerHTML='<div style="padding:16px;text-align:center;font-size:11px;color:#bbb;">まだ記録がありません</div>';return;}
  const rev = [...log].reverse().slice(0,10);
  document.getElementById('weight-history').innerHTML=rev.map((l,i)=>{
    const prev=rev[i+1];
    const diff=prev?((l.w-prev.w).toFixed(1)):null;
    const diffHtml=diff!==null?`<span class="history-diff" style="color:${diff<0?'var(--green)':diff>0?'var(--red)':'var(--text2)'}">${diff>0?'+':''}${diff}kg</span>`:'';
    return `<div class="history-row"><span class="history-date">${l.date}</span><div style="display:flex;align-items:center;gap:8px;">${diffHtml}<span class="history-w">${l.w}kg</span></div></div>`;
  }).join('');
}

function openWeightModal(){
  document.getElementById('weight-modal').classList.add('open');
  document.getElementById('weight-input').focus();
  document.body.classList.add('no-scroll');
}

function openGoalModal(){
  const cur = localStorage.getItem('goalWeight') || '';
  const v = prompt('目標体重を入力してください（kg）', cur);
  if(v && !isNaN(parseFloat(v))){
    localStorage.setItem('goalWeight', parseFloat(v));
    renderWeightPage();
    toast(`目標体重を${parseFloat(v)}kgに設定しました`);
  }
}
function closeWeightModal(){
  document.getElementById('weight-modal').classList.remove('open');
  document.body.classList.remove('no-scroll');
}
function handleModalClick(e){if(e.target===document.getElementById('weight-modal'))closeWeightModal();}

function saveWeight(){
  const v=parseFloat(document.getElementById('weight-input').value);
  if(!v||v<30||v>200){toast('正しい体重を入力してください');return;}
  const log=getWeightLog();
  const today=new Date();
  const date=`${today.getFullYear()}/${today.getMonth()+1}/${today.getDate()}`;
  log.push({date,w:v});
  saveWeightLog(log);
  closeWeightModal();
  renderWeightPage();
  toast(`${v}kgを記録しました！`);
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}
</script>
