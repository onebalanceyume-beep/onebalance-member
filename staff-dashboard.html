<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONE BALANCE スタッフ管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{--red:#C0392B;--orange:#E8621A;--bright:#F39C12;--grad:linear-gradient(135deg,#C0392B 0%,#E8621A 55%,#F39C12 100%);--grad-h:linear-gradient(90deg,#C0392B 0%,#E8621A 55%,#F39C12 100%);--bg:#111;--card:#1e1e1e;--card2:#252525;--border:#333;--muted:#888;--light:#ccc;--white:#fff;--green:#27AE60;--blue:#2980B9;--yellow:#F1C40F;--pink:#E74C3C;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--white);font-family:'Noto Sans JP',sans-serif;min-height:100vh;}
.hdr{background:var(--grad);position:sticky;top:0;z-index:200;box-shadow:0 4px 20px rgba(192,57,43,.5);}
.hdr-in{max-width:1100px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.hdr-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:#fff;}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.8);letter-spacing:1px;margin-top:1px;}
.hdr-right{display:flex;align-items:center;gap:10px;}
.hdr-date{font-size:12px;color:rgba(255,255,255,.85);background:rgba(0,0,0,.2);padding:6px 12px;border-radius:20px;}
.sync-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;padding:7px 14px;border-radius:8px;font-size:12px;font-family:'Noto Sans JP',sans-serif;font-weight:700;cursor:pointer;}
.nav{background:#181818;border-bottom:1px solid var(--border);position:sticky;top:52px;z-index:190;}
.nav-in{max-width:1100px;margin:0 auto;display:flex;overflow-x:auto;scrollbar-width:none;}
.nav-in::-webkit-scrollbar{display:none;}
.nav-tab{padding:14px 20px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;transition:.2s;}
.nav-tab.active{color:var(--orange);border-bottom-color:var(--orange);}
.main{max-width:1100px;margin:0 auto;padding:24px 16px 80px;}
.section{display:none;}.section.active{display:block;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:24px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 16px;text-align:center;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad-h);}
.kpi-num{font-family:'Bebas Neue',sans-serif;font-size:38px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.kpi-label{font-size:11px;color:var(--muted);margin-top:6px;font-weight:500;}
.kpi-sub{font-size:10px;color:var(--orange);margin-top:3px;}
.col2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
@media(max-width:640px){.col2{grid-template-columns:1fr;}}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;box-shadow:0 4px 16px rgba(0,0,0,.3);}
.card-title{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:14px;text-transform:uppercase;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bar-label{font-size:12px;color:var(--light);flex-shrink:0;text-align:right;}
.bar-wrap{flex:1;background:#2a2a2a;border-radius:999px;height:10px;overflow:hidden;}
.bar-fill{height:100%;border-radius:999px;background:var(--grad-h);}
.bar-val{font-size:12px;color:var(--orange);width:45px;text-align:right;font-weight:700;flex-shrink:0;}
.donut-wrap{display:flex;align-items:center;gap:20px;justify-content:center;}
.donut-svg{flex-shrink:0;}
.donut-legend{display:flex;flex-direction:column;gap:8px;}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--light);}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.month-selector{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.month-selector label{font-size:13px;color:var(--muted);}
.month-input{background:var(--card2);border:1px solid var(--border);color:var(--white);padding:8px 14px;border-radius:8px;font-size:13px;font-family:'Noto Sans JP',sans-serif;outline:none;}
.collection-header{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px;}
.coll-stat{background:var(--card2);border-radius:10px;padding:14px;text-align:center;}
.coll-stat-num{font-family:'Bebas Neue',sans-serif;font-size:30px;line-height:1;}
.coll-stat-num.green{color:var(--green);}.coll-stat-num.red{color:var(--pink);}.coll-stat-num.orange{color:var(--orange);}
.coll-stat-label{font-size:10px;color:var(--muted);margin-top:4px;}
.unpaid-title{font-size:14px;font-weight:700;color:var(--pink);margin-bottom:12px;}
.unpaid-list{display:flex;flex-direction:column;gap:8px;}
.unpaid-item{background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.25);border-radius:10px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.unpaid-name{font-size:14px;font-weight:700;color:var(--white);}
.unpaid-course{font-size:11px;color:var(--muted);margin-top:2px;}
.unpaid-amount{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--pink);}
.paid-btn{background:var(--green);border:none;color:#fff;padding:6px 14px;border-radius:6px;font-size:11px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;}
.paid-section{margin-top:20px;}
.paid-title{font-size:13px;font-weight:700;color:var(--green);margin-bottom:10px;}
.paid-list{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;}
.paid-item{background:rgba(39,174,96,.07);border:1px solid rgba(39,174,96,.2);border-radius:8px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
.paid-item-name{font-size:13px;color:var(--light);}
.paid-item-amount{font-size:12px;color:var(--green);font-weight:700;}
.grade-search{display:flex;gap:10px;margin-bottom:20px;}
.grade-search input{flex:1;background:var(--card2);border:1px solid var(--border);color:var(--white);padding:10px 16px;border-radius:10px;font-size:14px;font-family:'Noto Sans JP',sans-serif;outline:none;}
.member-grade-list{display:flex;flex-direction:column;gap:10px;}
.member-grade-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:16px;}
.mgc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.mgc-name{font-size:15px;font-weight:700;}
.mgc-course{font-size:11px;color:var(--muted);margin-top:2px;}
.current-grade{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.grade-btns{display:flex;flex-wrap:wrap;gap:8px;}
.grade-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;border:2px solid transparent;}
.grade-btn.active{box-shadow:0 0 0 3px rgba(255,255,255,.3);}
.grade-btn.white{background:#f0f0f0;color:#333;border-color:#ddd;}
.grade-btn.green{background:#27AE60;color:#fff;}
.grade-btn.blue{background:#2980B9;color:#fff;}
.grade-btn.orange-btn{background:#E8621A;color:#fff;}
.grade-btn.red-btn{background:#C0392B;color:#fff;}
.grade-btn.black{background:#1a1a1a;color:#fff;border-color:#555;}
.grade-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.dot-white{background:#e0e0e0;border:1px solid #999;}.dot-green{background:#27AE60;}.dot-blue{background:#2980B9;}.dot-orange{background:#E8621A;}.dot-red{background:#C0392B;}.dot-black{background:#555;}
.annual-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.annual-month{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;cursor:pointer;}
.am-label{font-size:11px;color:var(--muted);margin-bottom:4px;}
.am-rate{font-family:'Bebas Neue',sans-serif;font-size:24px;}
.am-rate.high{color:var(--green);}.am-rate.mid{color:var(--orange);}.am-rate.low{color:var(--pink);}
.am-count{font-size:10px;color:var(--muted);}
.config-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px;}
.config-label{font-size:13px;color:var(--muted);margin-bottom:8px;font-weight:700;}
.config-input{width:100%;background:var(--card2);border:1px solid var(--border);color:var(--white);padding:10px 14px;border-radius:8px;font-size:14px;font-family:'Noto Sans JP',sans-serif;outline:none;margin-bottom:16px;}
.config-btn{background:var(--grad);border:none;color:#fff;padding:12px 28px;border-radius:10px;font-size:14px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;}
.config-note{font-size:12px;color:var(--muted);line-height:1.8;margin-top:8px;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:#fff;padding:12px 28px;border-radius:999px;font-size:13px;font-weight:700;font-family:'Noto Sans JP',sans-serif;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px;}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-in"><div><div class="hdr-logo">ONE BALANCE スタッフ管理</div><div class="hdr-sub">STAFF DASHBOARD</div></div><div class="hdr-right"><div class="hdr-date" id="todayDate"></div><button class="sync-btn" onclick="loadData()">🔄 同期</button></div></div></div>
<div class="nav"><div class="nav-in">
<div class="nav-tab active" onclick="showTab('dashboard')">📊 ダッシュボード</div>
<div class="nav-tab" onclick="showTab('collection')">💴 会費回収</div>
<div class="nav-tab" onclick="showTab('grade')">🏅 グレード付与</div>
<div class="nav-tab" onclick="showTab('annual')">📅 年間ビュー</div>
<div class="nav-tab" onclick="showTab('config')">⚙️ 設定</div>
</div></div>
<div class="main">
<div class="section active" id="tab-dashboard">
<div id="kpi-area"><div class="loading"><div class="spinner"></div><br>読み込み中...</div></div>
<div class="col2" id="chart-area" style="display:none;"><div class="card"><div class="card-title">コース別人数</div><div id="course-bars"></div></div><div class="card"><div class="card-title">銀行別人数</div><div id="bank-bars"></div></div></div>
<div class="col2" id="chart-area2" style="display:none;"><div class="card"><div class="card-title">男女比（会員）</div><div class="donut-wrap" id="gender-donut"></div></div><div class="card"><div class="card-title">年齢層別（会員）</div><div id="age-bars"></div></div></div>
<div class="card" id="trial-card" style="display:none;margin-bottom:16px;"><div class="card-title">体験申込 → 成約率</div><div id="trial-stats"></div></div>
<div class="card" id="weekday-card" style="display:none;"><div class="card-title">週1コース 曜日別人数</div><div id="weekday-bars"></div></div>
</div>
<div class="section" id="tab-collection">
<div class="month-selector"><label>対象月：</label><input type="month" class="month-input" id="collectionMonth"></div>
<div class="collection-header"><div class="coll-stat"><div class="coll-stat-num orange" id="coll-total">—</div><div class="coll-stat-label">総会員数</div></div><div class="coll-stat"><div class="coll-stat-num green" id="coll-paid">—</div><div class="coll-stat-label">回収済み</div></div><div class="coll-stat"><div class="coll-stat-num red" id="coll-unpaid">—</div><div class="coll-stat-label">未回収</div></div></div>
<div class="card" style="margin-bottom:20px;"><div class="card-title">今月の回収率</div><div class="bar-row" style="margin-bottom:0;"><div style="font-size:14px;font-weight:700;color:var(--white);width:60px;" id="coll-rate-text">—%</div><div class="bar-wrap" style="height:14px;"><div class="bar-fill" id="coll-rate-bar" style="width:0%;background:var(--green);"></div></div></div></div>
<div class="unpaid-title">⚠ 未回収メンバー</div>
<div class="unpaid-list" id="unpaid-list"><div class="loading"><div class="spinner"></div><br>読み込み中...</div></div>
<div class="paid-section"><div class="paid-title">✓ 回収済みメンバー</div><div class="paid-list" id="paid-list"></div></div>
</div>
<div class="section" id="tab-grade">
<div class="grade-search"><input type="text" id="gradeSearch" placeholder="会員名で検索..." oninput="filterGradeList()"></div>
<div class="member-grade-list" id="grade-list"><div class="loading"><div class="spinner"></div><br>読み込み中...</div></div>
</div>
<div class="section" id="tab-annual">
<div class="annual-grid" id="annual-grid"></div>
<div id="annual-detail"></div>
</div>
<div class="section" id="tab-config">
<div class="config-card"><div class="card-title">🔗 GAS Web App URL</div><div class="config-label">GASのURLを入力</div><input type="text" class="config-input" id="gasUrl"><button class="config-btn" onclick="saveConfig()">保存して接続</button><div class="config-note" id="config-status"></div></div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
const GAS_URL_DEFAULT='https://script.google.com/macros/s/AKfycbzmQcrxRSvccB6LbWKWgrymU3nZBYhYWXY0Gi-Jy05-ldfv0hKyYKwXwZuIQpYMOZYyWg/exec';
let GAS_URL=GAS_URL_DEFAULT;
let allMembers=[];

document.addEventListener('DOMContentLoaded',()=>{
  const now=new Date();
  document.getElementById('todayDate').textContent=now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日（'+'日月火水木金土'[now.getDay()]+'）';
  const ym=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  document.getElementById('collectionMonth').value=ym;
  document.getElementById('collectionMonth').addEventListener('change',loadCollection);
  document.getElementById('gasUrl').value=GAS_URL;
  loadData();
});

function showTab(name){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  event.currentTarget.classList.add('active');
  if(name==='collection')loadCollection();
  if(name==='annual')loadAnnual();
}

async function loadData(){
  try{
    const res=await fetch(GAS_URL+'?action=getDashboard');
    const data=await res.json();
    if(!data.success)throw new Error(data.error);
    const s=data.summary;
    document.getElementById('kpi-area').innerHTML=`
      <div class="kpi-grid">
        <div class="kpi"><div class="kpi-num">${s.total}<span style="font-size:16px;-webkit-text-fill-color:var(--muted);">名</span></div><div class="kpi-label">現在の会員数</div></div>
        <div class="kpi"><div class="kpi-num" style="background:linear-gradient(135deg,#27AE60,#2ECC71);-webkit-background-clip:text;background-clip:text;">+${s.newCount}<span style="font-size:16px;-webkit-text-fill-color:var(--muted);">名</span></div><div class="kpi-label">今月 新規入会</div></div>
        <div class="kpi"><div class="kpi-num" style="background:linear-gradient(135deg,#E74C3C,#C0392B);-webkit-background-clip:text;background-clip:text;">${s.retireCount}<span style="font-size:16px;-webkit-text-fill-color:var(--muted);">名</span></div><div class="kpi-label">今月 退会</div></div>
        <div class="kpi"><div class="kpi-num">${s.female}<span style="font-size:16px;-webkit-text-fill-color:var(--muted);">名</span></div><div class="kpi-label">女性会員</div></div>
        <div class="kpi"><div class="kpi-num">${s.male}<span style="font-size:16px;-webkit-text-fill-color:var(--muted);">名</span></div><div class="kpi-label">男性会員</div></div>
        <div class="kpi"><div class="kpi-num">${s.paidCount}<span style="font-size:16px;-webkit-text-fill-color:var(--muted);">名</span></div><div class="kpi-label">今月 回収済み</div><div class="kpi-sub">${s.collRate}%</div></div>
      </div>`;
    allMembers=data.members||[];
    renderCharts(data);
    renderGradeList();
    showToast('✅ 同期完了');
  }catch(e){
    console.error(e);
    showToast('⚠️ 接続エラー: '+e.message);
  }
}

function renderCharts(data){
  document.getElementById('chart-area').style.display='grid';
  document.getElementById('chart-area2').style.display='grid';
  document.getElementById('trial-card').style.display='block';
  document.getElementById('weekday-card').style.display='block';
  const cc=data.courseCounts||{};
  const maxC=Math.max(...Object.values(cc),1);
  document.getElementById('course-bars').innerHTML=Object.entries(cc).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div class="bar-row"><div class="bar-label" style="width:130px;font-size:11px;">${k.length>14?k.substring(0,14)+'…':k}</div><div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(v/maxC*100)}%"></div></div><div class="bar-val">${v}名</div></div>`).join('');
  const bc=data.bankCounts||{};
  const maxB=Math.max(...Object.values(bc),1);
  document.getElementById('bank-bars').innerHTML=Object.entries(bc).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div class="bar-row"><div class="bar-label" style="width:110px;font-size:11px;">${k}</div><div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(v/maxB*100)}%"></div></div><div class="bar-val">${v}名</div></div>`).join('');
  const s=data.summary;
  const tot=s.male+s.female;
  const mp=tot>0?Math.round(s.male/tot*100):0;
  const fp=100-mp;
  const r=50,cx=65,cy=65,ci=2*Math.PI*r,md=ci*(mp/100);
  document.getElementById('gender-donut').innerHTML=`<svg class="donut-svg" width="130" height="130" viewBox="0 0 130 130"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#2a2a2a" stroke-width="22"/><circle cx="${cx}" cy="${cy}" r="${r}" fill="no
