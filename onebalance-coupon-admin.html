<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>クーポン管理 | ONE-BALANCE</title>
<style>
:root{
  --red:#DB444C; --blue:#5BB9CD; --gray:#727474;
  --bg:#fffaf5; --card:#fff; --border:#f0e6dc;
  --text:#2b2b2b; --sub:#7a7a7a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh;padding-bottom:100px}
.wrap{max-width:720px;margin:0 auto;padding:0 16px}

header{background:linear-gradient(135deg,var(--red) 0%,#c73841 100%);color:#fff;padding:20px 16px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.08)}
header h1{font-size:17px;font-weight:800;letter-spacing:.05em}
header p{font-size:12px;opacity:.9;margin-top:4px}

/* トレーナー戻るボタン（新規追加） */
.back-to-trainer{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(255,255,255,.2);color:#fff;border:1.5px solid rgba(255,255,255,.4);border-radius:20px;font-size:12px;font-weight:700;text-decoration:none;margin-top:10px;cursor:pointer;transition:all .2s}
.back-to-trainer:hover{background:rgba(255,255,255,.3)}
.back-to-trainer:active{transform:scale(.97)}

.view-tabs{display:flex;background:#f4ede5;margin:12px 0;padding:4px;border-radius:10px;gap:4px}
.view-tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:700;border-radius:8px;cursor:pointer;color:var(--sub);transition:all .2s}
.view-tab.active{background:var(--red);color:#fff;box-shadow:0 2px 6px rgba(219,68,76,.3)}

.coupon-card{background:var(--card);border-radius:14px;padding:16px;margin:10px 0;border:2px solid var(--border);position:relative;transition:all .2s}
.coupon-card.inactive{opacity:.5;background:#f9f9f9}
.coupon-card .code{font-size:20px;font-weight:800;color:var(--red);font-family:monospace;letter-spacing:.05em;margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.coupon-card .code-text{flex:1;min-width:150px}
.copy-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
.copy-btn:active{transform:scale(.95)}
.copy-btn.copied{background:#2a9f42}
.coupon-card .type{display:inline-block;padding:3px 10px;font-size:11px;background:var(--blue);color:#fff;border-radius:4px;font-weight:700;margin-bottom:8px}
.coupon-card .memo{font-size:13px;color:var(--gray);margin-bottom:10px}
.coupon-card .meta{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;font-size:11px;padding-top:10px;border-top:1px dotted #eadfd3}
.coupon-card .meta div{text-align:center}
.coupon-card .meta .lbl{color:var(--sub);display:block;margin-bottom:2px}
.coupon-card .meta .val{color:var(--text);font-weight:700}
.coupon-card .actions{position:absolute;top:12px;right:12px;display:flex;gap:6px}
.coupon-card .actions button{padding:6px 10px;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer}
.coupon-card .btn-edit{background:var(--blue);color:#fff}
.coupon-card .btn-del{background:var(--red);color:#fff}

.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0}
.stat{background:#fff;border-radius:10px;padding:14px 8px;text-align:center;border:1px solid var(--border)}
.stat .n{font-size:24px;font-weight:800;color:var(--red)}
.stat .l{font-size:10px;color:var(--sub);margin-top:2px}

.presets{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.preset{padding:12px;border:2px solid var(--border);border-radius:10px;background:#fff;cursor:pointer;text-align:center;transition:all .2s}
.preset:hover{border-color:var(--red);background:#fff6f0}
.preset .ttl{font-weight:700;font-size:13px;color:var(--red)}
.preset .dsc{font-size:10px;color:var(--sub);margin-top:3px}

.card{background:var(--card);border-radius:14px;padding:20px 16px;margin:12px 0;border:1px solid var(--border)}
.card h2{font-size:15px;color:var(--red);margin-bottom:14px;padding-bottom:8px;border-bottom:2px dotted #f3d9db;font-weight:700}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:700;margin-bottom:6px;color:var(--gray)}
.field input,.field select,.field textarea{width:100%;padding:11px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;background:#fff;font-family:inherit}
.field input:focus,.field select:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(219,68,76,.12)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.chk{display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 0}
.chk input{width:18px;height:18px;accent-color:var(--red)}

.btn{padding:12px 16px;border:none;border-radius:10px;font-weight:800;font-size:14px;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-primary{background:var(--red);color:#fff;width:100%;box-shadow:0 4px 10px rgba(219,68,76,.25)}
.btn-primary:active{transform:scale(.97)}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal.show{display:flex}
.modal-content{background:#fff;border-radius:16px;padding:20px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto}
.modal-content h3{color:var(--red);margin-bottom:16px;font-size:16px}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.btn-cancel{background:#eee;color:var(--gray);flex:1}

.loader{display:none;position:fixed;inset:0;background:rgba(255,255,255,.95);z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.loader.show{display:flex}
.spinner{width:40px;height:40px;border:4px solid #f4ede5;border-top:4px solid var(--red);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.empty{text-align:center;padding:40px 20px;color:var(--sub)}
.empty p{margin-bottom:8px}

.fab{position:fixed;bottom:20px;right:20px;width:60px;height:60px;border-radius:50%;background:var(--red);color:#fff;border:none;font-size:28px;font-weight:800;cursor:pointer;box-shadow:0 6px 16px rgba(219,68,76,.4);z-index:90}
.fab:active{transform:scale(.95)}
</style>
</head>
<body>

<header>
  <h1>🎟️ クーポン管理</h1>
  <p>ONE-BALANCE BOXING GYM</p>
  <a href="trainer.html" class="back-to-trainer">← トレーナー画面に戻る</a>
</header>

<div class="wrap">

  <div class="stats" id="stats">
    <div class="stat"><div class="n" id="stat-total">-</div><div class="l">総数</div></div>
    <div class="stat"><div class="n" id="stat-active">-</div><div class="l">有効</div></div>
    <div class="stat"><div class="n" id="stat-used">-</div><div class="l">使用回数</div></div>
  </div>

  <div class="view-tabs">
    <div class="view-tab active" data-view="list">📋 一覧</div>
    <div class="view-tab" data-view="create">➕ 新規作成</div>
  </div>

  <div id="view-list">
    <div id="coupons"></div>
  </div>

  <div id="view-create" style="display:none">

    <div class="card">
      <h2>⚡ プリセット（ワンタップ作成）</h2>
      <div class="presets">
        <div class="preset" data-preset="entry_free"><div class="ttl">入会金 完全無料</div><div class="dsc">¥8,800 → ¥0</div></div>
        <div class="preset" data-preset="entry_half"><div class="ttl">入会金 半額引き</div><div class="dsc">¥4,400引き</div></div>
        <div class="preset" data-preset="free2"><div class="ttl">月会費 2ヶ月無料</div><div class="dsc">翌月から2ヶ月間</div></div>
        <div class="preset" data-preset="free3"><div class="ttl">月会費 3ヶ月無料</div><div class="dsc">翌月から3ヶ月間</div></div>
      </div>
    </div>

    <div class="card">
      <h2>🛠️ 詳細設定で作成</h2>
      <div class="field"><label>クーポンコード（英数字）</label><input type="text" id="f-code" placeholder="例: SPRING2026" style="text-transform:uppercase"></div>
      <div class="field"><label>割引タイプ</label>
        <select id="f-type">
          <option value="entry_free">入会金：完全無料</option>
          <option value="entry_fixed">入会金:定額引き（円）</option>
          <option value="months_free">月会費：翌月以降◯ヶ月無料</option>
        </select>
      </div>
      <div class="field"><label>金額／月数</label><input type="number" id="f-amount" placeholder="0" value="0"></div>
      <p class="hint" style="font-size:11px;color:var(--sub);margin-top:-8px;margin-bottom:10px">
        ※入会金定額引き＝円単位／月会費◯ヶ月無料＝月数（1〜12）
      </p>
      <div class="row">
        <div class="field"><label>有効期限</label><input type="date" id="f-expiry"></div>
        <div class="field"><label>使用上限（0=無制限）</label><input type="number" id="f-limit" placeholder="0" value="0"></div>
      </div>
      <div class="field"><label>メモ</label><input type="text" id="f-memo" placeholder="キャンペーン説明"></div>
      <label class="chk"><input type="checkbox" id="f-active" checked><span>有効にする</span></label>
      <button class="btn btn-primary" onclick="createCoupon()" style="margin-top:10px">このクーポンを作成</button>
    </div>
  </div>

</div>

<div class="modal" id="edit-modal">
  <div class="modal-content">
    <h3>✏️ クーポン編集</h3>
    <input type="hidden" id="e-row">
    <div class="field"><label>コード</label><input type="text" id="e-code" style="text-transform:uppercase"></div>
    <div class="field"><label>タイプ</label>
      <select id="e-type">
        <option value="entry_free">入会金：完全無料</option>
        <option value="entry_fixed">入会金:定額引き（円）</option>
        <option value="months_free">月会費：翌月以降◯ヶ月無料</option>
      </select>
    </div>
    <div class="field"><label>金額／月数</label><input type="number" id="e-amount"></div>
    <div class="row">
      <div class="field"><label>有効期限</label><input type="date" id="e-expiry"></div>
      <div class="field"><label>使用上限</label><input type="number" id="e-limit"></div>
    </div>
    <div class="field"><label>使用回数（手動調整）</label><input type="number" id="e-used"></div>
    <div class="field"><label>メモ</label><input type="text" id="e-memo"></div>
    <label class="chk"><input type="checkbox" id="e-active"><span>有効</span></label>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeEdit()">キャンセル</button>
      <button class="btn btn-primary" onclick="updateCoupon()">更新する</button>
    </div>
  </div>
</div>

<div class="loader" id="loader"><div class="spinner"></div><p>処理中...</p></div>

<button class="fab" onclick="switchView('create')">＋</button>

<script>
/* キャッシュ対策 */
(function cacheControl(){
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(regs=>{regs.forEach(r=>r.unregister());}).catch(()=>{});
  }
  if('caches' in window){
    caches.keys().then(keys=>{keys.forEach(k=>caches.delete(k));}).catch(()=>{});
  }
  window.addEventListener('pageshow',(e)=>{if(e.persisted)window.location.reload();});
  let lastHidden=null;
  document.addEventListener('visibilitychange',()=>{
    if(document.hidden){lastHidden=Date.now();}
    else if(lastHidden){if(Date.now()-lastHidden>5*60*1000)window.location.reload();lastHidden=null;}
  });
})();

const GAS1_URL = 'https://script.google.com/macros/s/AKfycbxNxYgejS-1NZvt33PuIkh-DIEtHS9-hTFyAxUjO_8a6E9MM9CPxxDV8KMhX189c8oyrg/exec';

const TYPE_LABELS = {
  entry_free:'入会金 完全無料',
  entry_fixed:'入会金 -円引き',
  months_free:'月会費 ◯ヶ月無料'
};

window.addEventListener('DOMContentLoaded', ()=>{
  setupTabs();
  setupPresets();
  loadCoupons();
});

function setupTabs(){
  document.querySelectorAll('.view-tab').forEach(t=>{
    t.addEventListener('click', ()=>switchView(t.dataset.view));
  });
}
function switchView(v){
  document.querySelectorAll('.view-tab').forEach(t=>t.classList.toggle('active', t.dataset.view===v));
  document.getElementById('view-list').style.display = v==='list'?'block':'none';
  document.getElementById('view-create').style.display = v==='create'?'block':'none';
}

function setupPresets(){
  document.querySelectorAll('.preset').forEach(p=>{
    p.addEventListener('click', ()=>{
      const k = p.dataset.preset;
      const today = new Date();
      const future = new Date(today.getFullYear()+1, today.getMonth(), today.getDate());
      const exp = future.toISOString().slice(0,10);
      let code;
      if(k==='entry_free'){
        code = 'ENTRY0-' + Date.now().toString().slice(-5);
        createWithData({code, type:'entry_free', amount:0, expiry:exp, limit:0, active:true, memo:'入会金完全無料（プリセット）'});
      }else if(k==='entry_half'){
        code = 'ENTRY4400-' + Date.now().toString().slice(-5);
        createWithData({code, type:'entry_fixed', amount:4400, expiry:exp, limit:0, active:true, memo:'入会金4,400円引き（プリセット）'});
      }else if(k==='free2'){
        code = 'FREE2M-' + Date.now().toString().slice(-5);
        createWithData({code, type:'months_free', amount:2, expiry:exp, limit:0, active:true, memo:'翌月から2ヶ月無料（プリセット）'});
      }else if(k==='free3'){
        code = 'FREE3M-' + Date.now().toString().slice(-5);
        createWithData({code, type:'months_free', amount:3, expiry:exp, limit:0, active:true, memo:'翌月から3ヶ月無料（プリセット）'});
      }
    });
  });
}

function createWithData(data){
  if(!confirm('以下のクーポンを作成します：\nコード: '+data.code+'\n'+TYPE_LABELS[data.type]+'\n\n作成しますか？'))return;
  showLoader();
  jsonp(GAS1_URL + '?action=addCoupon_Nyukai&data=' + encodeURIComponent(JSON.stringify(data)), res=>{
    hideLoader();
    if(res.success){alert('✅ 作成しました: '+data.code); loadCoupons(); switchView('list')}
    else alert('❌ エラー: ' + (res.message||'不明'));
  });
}

function createCoupon(){
  const data = {
    code: document.getElementById('f-code').value.trim().toUpperCase(),
    type: document.getElementById('f-type').value,
    amount: Number(document.getElementById('f-amount').value) || 0,
    expiry: document.getElementById('f-expiry').value,
    limit: Number(document.getElementById('f-limit').value) || 0,
    active: document.getElementById('f-active').checked,
    memo: document.getElementById('f-memo').value.trim()
  };
  if(!data.code){alert('コードを入力してください');return}
  createWithData(data);
  document.getElementById('f-code').value='';
  document.getElementById('f-amount').value='0';
  document.getElementById('f-expiry').value='';
  document.getElementById('f-limit').value='0';
  document.getElementById('f-memo').value='';
}

function loadCoupons(){
  showLoader();
  jsonp(GAS1_URL + '?action=getCoupons_Nyukai&_t=' + Date.now(), (res)=>{
    hideLoader();
    if(!Array.isArray(res)){alert('読み込み失敗');return}
    renderCoupons(res);
    updateStats(res);
  });
}

function renderCoupons(list){
  const c = document.getElementById('coupons');
  if(!list.length){c.innerHTML='<div class="empty"><p>📭 クーポンがありません</p><p style="font-size:12px">右下の＋ボタンから作成できます</p></div>';return}
  c.innerHTML = list.map(x=>{
    const isExpired = x.expiry && new Date(x.expiry) < new Date();
    const isMaxed = x.limit > 0 && x.used >= x.limit;
    const active = x.active && !isExpired && !isMaxed;
    const memo = (x.memo||'').replace(/</g,'&lt;');
    const amt = x.type === 'months_free' 
      ? `${x.amount}ヶ月` 
      : x.type === 'entry_free' 
        ? '完全無料' 
        : '¥' + Number(x.amount||0).toLocaleString();
    return `
    <div class="coupon-card ${active?'':'inactive'}">
      <div class="actions">
        <button class="btn-edit" onclick="openEdit(${JSON.stringify(x).replace(/"/g,'&quot;')})">編集</button>
        <button class="btn-del" onclick="deleteCoupon(${x.row}, '${x.code}')">削除</button>
      </div>
      <div class="code">
        <span class="code-text">${x.code}</span>
        <button class="copy-btn" onclick="copyCouponCode('${x.code}', this)">📋 コピー</button>
      </div>
      <div class="type">${TYPE_LABELS[x.type]||x.type} / ${amt}</div>
      <div class="memo">${memo||'（メモなし）'}</div>
      <div class="meta">
        <div><span class="lbl">有効期限</span><span class="val">${x.expiry||'無期限'}</span></div>
        <div><span class="lbl">使用数</span><span class="val">${x.used}/${x.limit||'∞'}</span></div>
        <div><span class="lbl">状態</span><span class="val" style="color:${active?'#2a9f42':'#999'}">${active?'✅有効':isExpired?'期限切れ':isMaxed?'上限到達':'無効'}</span></div>
      </div>
    </div>`;
  }).join('');
}

function updateStats(list){
  document.getElementById('stat-total').textContent = list.length;
  document.getElementById('stat-active').textContent = list.filter(x=>{
    const ex = x.expiry && new Date(x.expiry)<new Date();
    const mx = x.limit>0 && x.used>=x.limit;
    return x.active && !ex && !mx;
  }).length;
  document.getElementById('stat-used').textContent = list.reduce((s,x)=>s+Number(x.used||0), 0);
}

function openEdit(x){
  document.getElementById('e-row').value = x.row;
  document.getElementById('e-code').value = x.code;
  document.getElementById('e-type').value = x.type;
  document.getElementById('e-amount').value = x.amount||0;
  document.getElementById('e-expiry').value = x.expiry||'';
  document.getElementById('e-limit').value = x.limit||0;
  document.getElementById('e-used').value = x.used||0;
  document.getElementById('e-memo').value = x.memo||'';
  document.getElementById('e-active').checked = !!x.active;
  document.getElementById('edit-modal').classList.add('show');
}
function closeEdit(){document.getElementById('edit-modal').classList.remove('show')}

function updateCoupon(){
  const data = {
    row: document.getElementById('e-row').value,
    code: document.getElementById('e-code').value.trim().toUpperCase(),
    type: document.getElementById('e-type').value,
    amount: Number(document.getElementById('e-amount').value) || 0,
    expiry: document.getElementById('e-expiry').value,
    limit: Number(document.getElementById('e-limit').value) || 0,
    used: Number(document.getElementById('e-used').value) || 0,
    active: document.getElementById('e-active').checked,
    memo: document.getElementById('e-memo').value.trim()
  };
  showLoader();
  jsonp(GAS1_URL + '?action=updateCoupon_Nyukai&data=' + encodeURIComponent(JSON.stringify(data)), res=>{
    hideLoader();
    closeEdit();
    if(res.success){alert('✅ 更新しました'); loadCoupons()}
    else alert('❌ ' + (res.message||'失敗'));
  });
}

function deleteCoupon(row, code){
  if(!confirm(`クーポン「${code}」を削除しますか？\nこの操作は取り消せません`))return;
  showLoader();
  jsonp(GAS1_URL + '?action=deleteCoupon_Nyukai&row=' + row, res=>{
    hideLoader();
    if(res.success){alert('🗑️ 削除しました'); loadCoupons()}
    else alert('❌ ' + (res.message||'失敗'));
  });
}

function jsonp(url, cb){
  const cbName = 'cb_'+Date.now()+'_'+Math.floor(Math.random()*10000);
  window[cbName] = (data)=>{cb(data);delete window[cbName];document.body.removeChild(s)};
  const s = document.createElement('script');
  s.src = url + (url.includes('?')?'&':'?') + 'callback=' + cbName;
  s.onerror = ()=>{cb({success:false,message:'通信エラー'});delete window[cbName]};
  document.body.appendChild(s);
}

function showLoader(){document.getElementById('loader').classList.add('show')}
function hideLoader(){document.getElementById('loader').classList.remove('show')}

function copyCouponCode(code, btn){
  // モダンブラウザ対応
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(code).then(()=>{
      showCopySuccess(btn);
    }).catch(()=>{
      fallbackCopy(code, btn);
    });
  } else {
    fallbackCopy(code, btn);
  }
}

function fallbackCopy(text, btn){
  // iOS Safari等で動作する旧式コピー
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.select();
  try {
    document.execCommand('copy');
    showCopySuccess(btn);
  } catch(e) {
    alert('コピーに失敗しました。手動でコピーしてください: ' + text);
  }
  document.body.removeChild(textarea);
}

function showCopySuccess(btn){
  const original = btn.innerHTML;
  btn.innerHTML = '✓ コピー済み';
  btn.classList.add('copied');
  setTimeout(()=>{
    btn.innerHTML = original;
    btn.classList.remove('copied');
  }, 2000);
}
