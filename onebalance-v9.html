<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テスト</title>
<style>
body { font-family: sans-serif; padding: 20px; }
.mc { border: 2px solid #ccc; border-radius: 12px; padding: 16px; margin-bottom: 12px; cursor: pointer; }
.mc.sel { border-color: red; background: #fff0f0; }
.btnp { width: 100%; padding: 16px; background: red; color: white; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; margin-top: 16px; }
.panel { display: none; }
.panel.on { display: block; }
</style>
</head>
<body>

<div id="p1" class="panel on">
  <h2>STEP1: メニュー選択</h2>
  <div class="mc" id="mc-kick" onclick="pickMenu('kick')">キックボクササイズ体験</div>
  <div class="mc" id="mc-boxing" onclick="pickMenu('boxing')">ボクシング体験</div>
  <div class="mc" id="mc-tour" onclick="pickMenu('tour')">ジム見学</div>
  <button class="btnp" onclick="go(2)">次へ → 日程を選ぶ</button>
</div>

<div id="p2" class="panel">
  <h2>STEP2: 日程選択</h2>
  <p>日程画面です</p>
  <button class="btnp" onclick="go(1)">← 戻る</button>
</div>

<script>
var menu = 'kick';

function pickMenu(m) {
  menu = m;
  var ids = ['kick','boxing','tour'];
  for (var i = 0; i < ids.length; i++) {
    document.getElementById('mc-' + ids[i]).className = 'mc';
  }
  document.getElementById('mc-' + m).className = 'mc sel';
  alert('選択: ' + m);
}

function go(n) {
  document.getElementById('p1').classList.remove('on');
  document.getElementById('p2').classList.remove('on');
  document.getElementById('p' + n).classList.add('on');
}
</script>
</body>
</html>
